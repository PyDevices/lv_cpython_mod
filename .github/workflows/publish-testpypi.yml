# Build lvgl-cpython wheels (Linux + Windows + Android + Pyodide/wasm) and upload to TestPyPI.
#
# Release trigger: push an annotated semver tag vX.Y.Z (see scripts/publish_release_tag.sh),
# or workflow_dispatch (also used by sync-and-release via RELEASE_WORKFLOW_TOKEN).
#
# Required repository secret (Settings → Secrets and variables → Actions):
#   TESTPYPI_API_TOKEN — TestPyPI API token (same as PyDevices/pydisplay)
#
# Install from TestPyPI (wheels are platform-specific):
#   pip install -i https://test.pypi.org/simple/ lvgl-cpython
# Pyodide / micropip (pyemscripten_2026_0 wasm32 wheel, same release version):
#   await micropip.install("lvgl-cpython", index_urls="https://test.pypi.org/simple/")

name: Publish TestPyPI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Semver X.Y.Z (required unless the checked-out ref is a vX.Y.Z tag)
        type: string
        required: false

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: github.repository == 'PyDevices/lv_cpython_mod'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          normalize() {
            local v="${1#v}"
            v="$(echo "$v" | tr -d '[:space:]')"
            if [[ ! "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid semver: $1 (expected X.Y.Z)" >&2
              exit 1
            fi
            echo "$v"
          }

          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="$(normalize "${GITHUB_REF_NAME}")"
          elif [[ -n "${INPUT_VERSION:-}" ]]; then
            VERSION="$(normalize "$INPUT_VERSION")"
          else
            TAG="$(git describe --tags --exact-match 2>/dev/null || true)"
            if [[ -z "$TAG" ]]; then
              echo "Set the version input or run this workflow from a vX.Y.Z tag." >&2
              exit 1
            fi
            VERSION="$(normalize "$TAG")"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing lvgl-cpython release $VERSION"

  build-wheels:
    needs: prepare
    runs-on: ${{ matrix.os }}
    if: github.repository == 'PyDevices/lv_cpython_mod'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Write VERSION file
        shell: bash
        run: echo "${{ needs.prepare.outputs.version }}" > VERSION

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-android-wheels:
    needs: prepare
    runs-on: ubuntu-latest
    if: github.repository == 'PyDevices/lv_cpython_mod'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Write VERSION file
        shell: bash
        run: echo "${{ needs.prepare.outputs.version }}" > VERSION

      - name: Build Android wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_PLATFORM: android
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-android
          path: wheelhouse/*.whl

  build-pyodide-wheel:
    needs: prepare
    runs-on: ubuntu-latest
    if: github.repository == 'PyDevices/lv_cpython_mod'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Write VERSION file
        run: echo "${{ needs.prepare.outputs.version }}" > VERSION

      - name: Install uv (host Python 3.14 for xbuildenv)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Node.js (Emscripten / pyodide-build)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build pyemscripten_2026_0 wasm wheel
        run: |
          set -euo pipefail
          uv python install 3.14
          ./scripts/build_pyodide_wheel.sh --no-copy
          mkdir -p wheelhouse
          shopt -s nullglob
          wheels=(
            dist/lvgl_cpython-*-pyemscripten_*_wasm32.whl
            dist/lvgl_cpython-*-pyodide_*_wasm32.whl
            dist/lvgl_cpython-*-emscripten_*_wasm32.whl
          )
          if ((${#wheels[@]} == 0)); then
            echo "error: no wasm wheel in dist/" >&2
            ls -la dist/ >&2 || true
            exit 1
          fi
          cp -f "${wheels[@]}" wheelhouse/
          ls -la wheelhouse/

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-pyodide
          path: wheelhouse/*.whl

  publish:
    needs: [prepare, build-wheels, build-android-wheels, build-pyodide-wheel]
    runs-on: ubuntu-latest
    if: github.repository == 'PyDevices/lv_cpython_mod'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          merge-multiple: true
          path: dist

      - name: List wheels
        run: ls -la dist/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upload to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          python -m pip install twine
          twine upload --repository testpypi --verbose dist/*
